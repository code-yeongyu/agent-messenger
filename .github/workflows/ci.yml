name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install docs dependencies
        run: cd docs && bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Test
        run: bun run test

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Verify built CLI runs on Node
        run: |
          node dist/src/cli.js --help
          node dist/src/cli.js slack --help
          node dist/src/cli.js slackbot --help
          node dist/src/cli.js discord --help
          node dist/src/cli.js discordbot --help
          node dist/src/cli.js teams --help

  npm-install:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Rewrite paths for publish
        run: bun scripts/prepublish.ts

      - name: Pack
        run: npm pack

      - name: Verify npm install works
        run: |
          mkdir /tmp/test-npm
          cp agent-messenger-*.tgz /tmp/test-npm/
          cd /tmp/test-npm
          npm init -y
          npm install ./agent-messenger-*.tgz
          npx agent-messenger --help

      - name: Verify bun install works
        run: |
          mkdir /tmp/test-bun
          cp agent-messenger-*.tgz /tmp/test-bun/
          cd /tmp/test-bun
          echo '{}' > package.json
          bun add ./agent-messenger-*.tgz
          bunx agent-messenger --help
