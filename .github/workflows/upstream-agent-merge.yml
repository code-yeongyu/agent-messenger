name: Upstream Agent Merge

'on':
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Run even if upstream is already merged'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Run merge + QA, but do not push, open, or merge a PR'
        required: false
        type: boolean
        default: false
      upstream_repository:
        description: 'Repository to sync from'
        required: false
        type: string
        default: 'agent-messenger/agent-messenger'
      upstream_branch:
        description: 'Branch to sync from'
        required: false
        type: string
        default: 'main'
      model:
        description: 'Codex model override (optional)'
        required: false
        type: string
        default: ''
      codex_profile:
        description: 'Codex profile to use'
        required: false
        type: string
        default: 'quotio'

permissions:
  contents: write
  issues: write
  pull-requests: write
  checks: read

concurrency:
  group: upstream-agent-merge
  cancel-in-progress: false

jobs:
  merge-upstream:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      DEFAULT_MODEL: gpt-5.5
      DEFAULT_CODEX_PROFILE: quotio
      MODEL_INPUT: ${{ github.event.inputs.model || '' }}
      CODEX_PROFILE_INPUT: ${{ github.event.inputs.codex_profile || 'quotio' }}
      UPSTREAM_REPOSITORY: ${{ github.event.inputs.upstream_repository || 'agent-messenger/agent-messenger' }}
      UPSTREAM_BRANCH: ${{ github.event.inputs.upstream_branch || 'main' }}
      EVIDENCE_DIR: local-ignore/qa-evidence/upstream-agent
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git and upstream remote
        run: |
          set -euo pipefail
          git config user.name "agent-messenger-upstream-bot"
          git config user.email "actions@github.com"
          git remote add upstream "https://github.com/${UPSTREAM_REPOSITORY}.git" 2>/dev/null \
            || git remote set-url upstream "https://github.com/${UPSTREAM_REPOSITORY}.git"
          git fetch --quiet upstream "${UPSTREAM_BRANCH}"

      - name: Detect upstream work
        id: detect
        run: |
          set -euo pipefail
          ARGS=(--remote upstream --branch "${UPSTREAM_BRANCH}")
          if [ "${{ github.event.inputs.force }}" = "true" ]; then ARGS+=(--force); fi
          node scripts/check-upstream-sync.mjs "${ARGS[@]}"

      - name: Setup Node.js
        if: steps.detect.outputs.proceed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Bun
        if: steps.detect.outputs.proceed == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install system dependencies
        if: steps.detect.outputs.proceed == 'true'
        run: |
          sudo env DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get install -y ripgrep tmux

      - name: Install dependencies
        if: steps.detect.outputs.proceed == 'true'
        run: |
          bun install --frozen-lockfile
          cd docs && bun install --frozen-lockfile

      - name: Install Codex and LazyCodex
        if: steps.detect.outputs.proceed == 'true'
        run: |
          npm install -g --force --ignore-scripts @openai/codex@latest lazycodex-ai@latest oh-my-openagent@latest
          mkdir -p "$EVIDENCE_DIR"
          {
            echo "codex: $(codex --version)"
            echo "lazycodex: $(lazycodex --version)"
            echo "lazycodex-ai: $(lazycodex-ai --version)"
            npm view @openai/codex dist-tags.latest dist.integrity --json
            npm view lazycodex-ai dist-tags.latest dist.integrity --json
            npm view oh-my-openagent dist-tags.latest dist.integrity --json
          } | tee "$EVIDENCE_DIR/tool-versions.txt"

      - name: Hydrate Codex secrets
        if: steps.detect.outputs.proceed == 'true'
        env:
          CODEX_AUTH_JSON_B64: ${{ secrets.CODEX_AUTH_JSON_B64 }}
          CODEX_CONFIG_TOML_B64: ${{ secrets.CODEX_CONFIG_TOML_B64 }}
          CODEX_QUOTIO_CONFIG_TOML_B64: ${{ secrets.CODEX_QUOTIO_CONFIG_TOML_B64 }}
          CODEX_CCAPI_CONFIG_TOML_B64: ${{ secrets.CODEX_CCAPI_CONFIG_TOML_B64 }}
          QUOTIO_API_KEY: ${{ secrets.QUOTIO_API_KEY }}
          QUOTIO_BASE_URL: ${{ secrets.QUOTIO_BASE_URL }}
        run: |
          set -euo pipefail
          umask 077
          mkdir -p "$HOME/.codex" "$EVIDENCE_DIR"

          write_secret_b64() {
            local value="$1"
            local path="$2"
            if [ -n "$value" ]; then
              printf '%s' "$value" | base64 -d > "$path"
              chmod 600 "$path"
            fi
          }

          write_secret_b64 "$CODEX_AUTH_JSON_B64" "$HOME/.codex/auth.json"
          write_secret_b64 "$CODEX_CONFIG_TOML_B64" "$HOME/.codex/config.toml"
          write_secret_b64 "$CODEX_QUOTIO_CONFIG_TOML_B64" "$HOME/.codex/quotio.config.toml"
          write_secret_b64 "$CODEX_CCAPI_CONFIG_TOML_B64" "$HOME/.codex/ccapi.config.toml"

          if [ ! -s "$HOME/.codex/config.toml" ]; then
            if [ -z "$QUOTIO_API_KEY" ]; then
              echo "::error::Provide CODEX_CONFIG_TOML_B64 or QUOTIO_API_KEY for Codex."
              exit 1
            fi
            {
              echo 'model = "gpt-5.5"'
              echo 'model_provider = "quotio"'
              echo 'model_reasoning_effort = "high"'
              echo 'approval_policy = "never"'
              echo 'sandbox_mode = "danger-full-access"'
              echo 'network_access = "enabled"'
              echo 'shell_environment_policy = { inherit = "all" }'
              echo
              echo '[model_providers.quotio]'
              echo 'name = "Quotio"'
              echo "base_url = \"${QUOTIO_BASE_URL:-https://quotio.mengmota.com/v1}\""
              echo 'env_key = "QUOTIO_API_KEY"'
              echo 'wire_api = "responses"'
              echo 'requires_openai_auth = false'
            } > "$HOME/.codex/config.toml"
            chmod 600 "$HOME/.codex/config.toml"
          fi

          test -s "$HOME/.codex/config.toml"
          if [ ! -s "$HOME/.codex/auth.json" ] && [ -z "$QUOTIO_API_KEY" ]; then
            echo "::error::Provide CODEX_AUTH_JSON_B64 or QUOTIO_API_KEY."
            exit 1
          fi
          find "$HOME/.codex" -maxdepth 1 -type f -printf '%p %m\n' \
            | sed "s#${HOME}#~#" | tee "$EVIDENCE_DIR/secret-files.txt"

      - name: Run Codex merge agent
        id: agent
        if: steps.detect.outputs.proceed == 'true'
        env:
          UPSTREAM_SHA: ${{ steps.detect.outputs.sha }}
          UPSTREAM_SHORT_SHA: ${{ steps.detect.outputs.short_sha }}
          QUOTIO_API_KEY: ${{ secrets.QUOTIO_API_KEY }}
        run: |
          set -euo pipefail
          BRANCH="automation/sync-upstream-${UPSTREAM_SHORT_SHA}-${GITHUB_RUN_ID}"
          git checkout -B "$BRANCH"

          {
            cat .github/agent/merge-driver.md
            echo
            echo "The upstream branch is upstream/${UPSTREAM_BRANCH}."
            echo "The upstream commit to integrate is ${UPSTREAM_SHA}."
          } > /tmp/codex-merge-driver.md

          MODEL="${MODEL_INPUT:-$DEFAULT_MODEL}"
          PROFILE="${CODEX_PROFILE_INPUT:-$DEFAULT_CODEX_PROFILE}"
          set +e
          codex exec \
            --profile "$PROFILE" \
            --cd "$GITHUB_WORKSPACE" \
            --dangerously-bypass-approvals-and-sandbox \
            --dangerously-bypass-hook-trust \
            --output-last-message /tmp/codex-last-message.md \
            -m "$MODEL" \
            - < /tmp/codex-merge-driver.md 2>&1 | tee /tmp/codex-agent.log
          CODEX_STATUS="${PIPESTATUS[0]}"
          set -e

          RESULT="$(grep -E '^MERGE_RESULT:' /tmp/codex-agent.log /tmp/codex-last-message.md 2>/dev/null | tail -1 | awk '{print $2}')"
          if [ -z "$RESULT" ] && [ "$CODEX_STATUS" -ne 0 ]; then RESULT="AGENT_FAILED"; fi
          if [ -f .github/agent/last-merge-report.md ]; then
            mkdir -p "$EVIDENCE_DIR"
            cp .github/agent/last-merge-report.md "$EVIDENCE_DIR/last-merge-report.md"
            if git cat-file -e HEAD:.github/agent/last-merge-report.md 2>/dev/null; then
              git rm --quiet --force -- .github/agent/last-merge-report.md
              git commit --quiet --only -m "chore: remove upstream agent report" -- .github/agent/last-merge-report.md
            else
              rm .github/agent/last-merge-report.md
            fi
          fi
          echo "result=${RESULT:-AGENT_FAILED}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "Agent result: ${RESULT:-AGENT_FAILED}"

      - name: Verify branch and capture QA evidence
        if: steps.detect.outputs.proceed == 'true' && steps.agent.outputs.result == 'CLEAN_PR_READY'
        run: |
          set -euo pipefail
          mkdir -p "$EVIDENCE_DIR"
          git status --porcelain | tee "$EVIDENCE_DIR/git-status-before-qa.txt"
          test ! -s "$EVIDENCE_DIR/git-status-before-qa.txt"
          bun run typecheck 2>&1 | tee "$EVIDENCE_DIR/bun-typecheck.txt"
          bun run lint 2>&1 | tee "$EVIDENCE_DIR/bun-lint.txt"
          bun run format:check 2>&1 | tee "$EVIDENCE_DIR/bun-format-check.txt"
          bun run test 2>&1 | tee "$EVIDENCE_DIR/bun-test.txt"
          bun run build 2>&1 | tee "$EVIDENCE_DIR/bun-build.txt"
          node dist/src/cli.js --help 2>&1 | tee "$EVIDENCE_DIR/cli-help.txt"
          node dist/src/cli.js slack --help 2>&1 | tee "$EVIDENCE_DIR/cli-slack-help.txt"

      - name: Open and merge upstream PR
        id: pr
        if: steps.detect.outputs.proceed == 'true' && steps.agent.outputs.result == 'CLEAN_PR_READY' && github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_AUTOMATION_TOKEN }}
          UPSTREAM_SHA: ${{ steps.detect.outputs.sha }}
          UPSTREAM_SHORT_SHA: ${{ steps.detect.outputs.short_sha }}
        run: |
          set -euo pipefail
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::UPSTREAM_AUTOMATION_TOKEN is required so branch pushes trigger follow-up workflows."
            exit 1
          fi

          BRANCH="${{ steps.agent.outputs.branch }}"
          git fetch --quiet origin main
          AHEAD_COUNT="$(git rev-list --count origin/main..HEAD)"
          if [ "$AHEAD_COUNT" = "0" ]; then
            echo "::error::Merge agent reported CLEAN_PR_READY, but HEAD has no commits ahead of origin/main."
            exit 1
          fi
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:$BRANCH"

          BODY_FILE=/tmp/upstream-pr-body.md
          {
            echo "Automated upstream sync for \`${UPSTREAM_SHORT_SHA}\`."
            echo
            echo "- Upstream repository: \`${UPSTREAM_REPOSITORY}\`"
            echo "- Upstream branch: \`${UPSTREAM_BRANCH}\`"
            echo "- Upstream SHA: \`${UPSTREAM_SHA}\`"
            echo "- Evidence artifact: \`upstream-agent-qa-${UPSTREAM_SHORT_SHA}\`"
            echo
            echo "QA completed before PR creation:"
            echo "- \`bun run typecheck\`"
            echo "- \`bun run lint\`"
            echo "- \`bun run format:check\`"
            echo "- \`bun run test\`"
            echo "- \`bun run build\`"
            echo "- built CLI help smoke tests"
          } > "$BODY_FILE"

          EXISTING="$(gh pr list --base main --head "$BRANCH" --state open --json number --jq '.[0].number // empty')"
          if [ -n "$EXISTING" ]; then
            PR_NUMBER="$EXISTING"
            gh pr edit "$PR_NUMBER" --title "sync: upstream ${UPSTREAM_SHORT_SHA}" --body-file "$BODY_FILE"
          else
            PR_URL="$(gh pr create --base main --head "$BRANCH" --title "sync: upstream ${UPSTREAM_SHORT_SHA}" --body-file "$BODY_FILE")"
            PR_NUMBER="${PR_URL##*/}"
          fi
          echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "url=$(gh pr view "$PR_NUMBER" --json url --jq .url)" >> "$GITHUB_OUTPUT"

          gh pr checks "$PR_NUMBER" --watch --fail-fast --interval 30
          HEAD_SHA="$(gh pr view "$PR_NUMBER" --json headRefOid --jq .headRefOid)"
          gh pr merge "$PR_NUMBER" --merge --delete-branch --match-head-commit "$HEAD_SHA"

      - name: Upload QA evidence
        if: always() && steps.detect.outputs.proceed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: upstream-agent-qa-${{ steps.detect.outputs.short_sha || 'unknown' }}
          path: local-ignore/qa-evidence/
          if-no-files-found: warn

      - name: Open conflict / failure issue
        if: steps.detect.outputs.proceed == 'true' && steps.agent.outputs.result != 'CLEAN_PR_READY' && steps.agent.outputs.result != 'NO_RELEASE_NEEDED' && steps.agent.outputs.result != ''
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_AUTOMATION_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::UPSTREAM_AUTOMATION_TOKEN is required to open an upstream failure issue."
            exit 1
          fi
          RESULT="${{ steps.agent.outputs.result }}"
          BODY_FILE=/tmp/issue-body.md
          {
            echo "Automated upstream merge for \`${{ steps.detect.outputs.short_sha }}\` did not complete cleanly (result: \`${RESULT}\`)."
            echo
            echo "## Agent report"
            echo
            if [ -f "$EVIDENCE_DIR/last-merge-report.md" ]; then cat "$EVIDENCE_DIR/last-merge-report.md"; else echo "(no report written)"; fi
            echo
            echo "Resolve manually, then re-run \`Upstream Agent Merge\` with \`force=true\`."
          } > "$BODY_FILE"
          gh label create sync-conflict --color D73A4A --description "Automated upstream sync needs maintainer attention" || true
          gh issue create \
            --title "upstream merge needs attention: ${{ steps.detect.outputs.short_sha }} (${RESULT})" \
            --label "sync-conflict" \
            --body-file "$BODY_FILE" || gh issue create \
            --title "upstream merge needs attention: ${{ steps.detect.outputs.short_sha }} (${RESULT})" \
            --body-file "$BODY_FILE"
          exit 1

      - name: No new upstream work
        id: no_new_upstream
        if: steps.detect.outputs.proceed != 'true'
        run: |
          echo "No new upstream work. Current pin: ${{ steps.detect.outputs.current_sha }}. Nothing to do."

      - name: Summarize upstream merge outcome
        if: always()
        env:
          PROCEED: ${{ steps.detect.outputs.proceed || 'false' }}
          DETECT_REASON: ${{ steps.detect.outputs.reason || 'unknown' }}
          CURRENT_SHA: ${{ steps.detect.outputs.current_sha || '' }}
          CURRENT_SYNCED_AT: ${{ steps.detect.outputs.current_synced_at || '' }}
          UPSTREAM_SHA: ${{ steps.detect.outputs.sha || '' }}
          UPSTREAM_SHORT_SHA: ${{ steps.detect.outputs.short_sha || '' }}
          AGENT_RESULT: ${{ steps.agent.outputs.result || 'skipped' }}
          AGENT_BRANCH: ${{ steps.agent.outputs.branch || '' }}
          PR_URL: ${{ steps.pr.outputs.url || '' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          PR_OUTCOME: ${{ steps.pr.outcome || 'skipped' }}
          NO_NEW_UPSTREAM_OUTCOME: ${{ steps.no_new_upstream.outcome || 'skipped' }}
        run: |
          set -euo pipefail
          follow_up="none"
          if [ "$PROCEED" != "true" ]; then
            follow_up="none: upstream already merged"
          elif [ "$AGENT_RESULT" != "CLEAN_PR_READY" ]; then
            follow_up="attention issue or failure path: agent result ${AGENT_RESULT}"
          elif [ "$DRY_RUN" = "true" ]; then
            follow_up="dry run completed; no PR was pushed"
          elif [ "$PR_OUTCOME" = "success" ]; then
            follow_up="sync PR merged"
          else
            follow_up="PR step did not complete; inspect logs"
          fi

          {
            echo "## Upstream merge outcome"
            echo
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| New upstream work detected | \`${PROCEED}\` |"
            echo "| Detection reason | \`${DETECT_REASON}\` |"
            echo "| Upstream repository | \`${UPSTREAM_REPOSITORY}\` |"
            echo "| Upstream branch | \`${UPSTREAM_BRANCH}\` |"
            echo "| Previous pinned SHA | \`${CURRENT_SHA:-unknown}\` |"
            echo "| Previous synced at | \`${CURRENT_SYNCED_AT:-unknown}\` |"
            echo "| Upstream SHA | \`${UPSTREAM_SHA:-none}\` |"
            echo "| Upstream short SHA | \`${UPSTREAM_SHORT_SHA:-none}\` |"
            echo "| Merge agent result | \`${AGENT_RESULT}\` |"
            echo "| Automation branch | \`${AGENT_BRANCH:-none}\` |"
            echo "| Sync PR | ${PR_URL:-none} |"
            echo "| PR step | \`${PR_OUTCOME}\` |"
            echo "| Dry run input | \`${DRY_RUN}\` |"
            echo "| No-new-upstream path | \`${NO_NEW_UPSTREAM_OUTCOME}\` |"
            echo
            echo "**Follow-up action:** ${follow_up}"
          } >> "$GITHUB_STEP_SUMMARY"
